# Serves static SPA; fallback to index.html for client-side routing.
# Root redirects to default language so React Router sees /pl/.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location = / {
        return 301 /pl/;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
